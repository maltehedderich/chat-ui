<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" /> <!-- Sky Blue -->
      <stop offset="40%" stop-color="#6366f1" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#8b5cf6" /> <!-- Violet -->
    </linearGradient>
  </defs>

  <!-- Clean, geometric, minimalistic chat outline -->
  <path d="M 120 360
           A 192 192 0 1 1 206 410
           L 72 440 Z" 
        fill="none" 
        stroke="url(#grad)" 
        stroke-width="48" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
        
  <!-- Minimalist typing indicator dots -->
  <circle cx="160" cy="232" r="24" fill="url(#grad)" />
  <circle cx="256" cy="232" r="24" fill="url(#grad)" />
  <circle cx="352" cy="232" r="24" fill="url(#grad)" />
</svg>